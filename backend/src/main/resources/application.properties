spring.datasource.url=${DB_URL:jdbc:h2:mem:attendance;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
server.port=8081
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200,http://127.0.0.1:4200,http://10.198.3.33:4200}
app.seed.admin.username=${ADMIN_USERNAME:admin}
app.seed.admin.password=${ADMIN_PASSWORD:admin123}
app.seed.admin.email=${ADMIN_EMAIL:admin@example.com}
app.seed.admin.full-name=${ADMIN_FULL_NAME:System Administrator}
